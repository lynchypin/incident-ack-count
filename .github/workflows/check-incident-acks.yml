name: Check PagerDuty Incident Acknowledgments

on:
  repository_dispatch:
    types: [check-incident-acks]

jobs:
  check-and-add-responders:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Wait 3 minutes before checking acknowledgments
        run: |
          echo "⏱️  Waiting 3 minutes before checking acknowledgment count..."
          echo "Started at: $(date)"
          sleep 10
          echo "Wait complete at: $(date)"
      
      - name: Check acknowledgment count and add responders if needed
        env:
          PD_API_KEY: ${{ secrets.PD_API_KEY }}
          PD_FROM_EMAIL: ${{ secrets.PD_FROM_EMAIL }}
          INCIDENT_ID: ${{ github.event.client_payload.incident_id }}
          INCIDENT_NUMBER: ${{ github.event.client_payload.incident_number }}
        run: |
          echo "================================================"
          echo "PagerDuty Incident Acknowledgment Checker"
          echo "================================================"
          echo "Incident ID: ${INCIDENT_ID}"
          echo "Incident Number: ${INCIDENT_NUMBER}"
          echo "================================================"
          
          # Get incident details including acknowledgments
          echo "Fetching incident details..."
          INCIDENT_DATA=$(curl -s -X GET \
            "https://api.pagerduty.com/incidents/${INCIDENT_ID}" \
            -H "Authorization: Token token=${PD_API_KEY}" \
            -H "Accept: application/vnd.pagerduty+json;version=2")
          
          # Check if API call was successful
          if [ $? -ne 0 ]; then
            echo "ERROR: Failed to fetch incident data from PagerDuty API"
            exit 1
          fi
          
          # Extract escalation policy ID and service ID from incident data
          EP_ID=$(echo $INCIDENT_DATA | jq -r '.incident.escalation_policy.id')
          SERVICE_ID=$(echo $INCIDENT_DATA | jq -r '.incident.service.id')
          
          echo "✓ Escalation Policy ID: ${EP_ID}"
          echo "✓ Service ID: ${SERVICE_ID}"
          
          # Count acknowledgments
          ACK_COUNT=$(echo $INCIDENT_DATA | jq '.incident.acknowledgements | length')
          
          echo "✓ Incident ${INCIDENT_NUMBER} has ${ACK_COUNT} acknowledgment(s)"
          
          # Get incident status
          INCIDENT_STATUS=$(echo $INCIDENT_DATA | jq -r '.incident.status')
          echo "✓ Incident status: ${INCIDENT_STATUS}"
          
          # If less than 2 acks and incident is still triggered or acknowledged, add Layer 2 responders
          if [ $ACK_COUNT -lt 2 ] && [ "$INCIDENT_STATUS" != "resolved" ]; then
            echo ""
            echo "⚠️  Less than 2 acknowledgments detected!"
            echo "Adding Layer 2 responders from escalation policy..."
            
            # Get EP details to find Layer 2 information
            EP_DATA=$(curl -s -X GET \
              "https://api.pagerduty.com/escalation_policies/${EP_ID}" \
              -H "Authorization: Token token=${PD_API_KEY}" \
              -H "Accept: application/vnd.pagerduty+json;version=2")
            
            # Get EP name for logging
            EP_NAME=$(echo $EP_DATA | jq -r '.escalation_policy.name')
            echo "✓ Escalation Policy: ${EP_NAME}"
            
            # Count escalation levels
            LEVEL_COUNT=$(echo $EP_DATA | jq '.escalation_policy.escalation_rules | length')
            echo "✓ Escalation Policy has ${LEVEL_COUNT} level(s)"
            
            # Check if Layer 2 exists (index 1)
            if [ $LEVEL_COUNT -lt 2 ]; then
              echo "⚠️  WARNING: Escalation Policy only has 1 level. No Layer 2 to add."
              exit 0
            fi
            
            # Get Layer 2 targets (schedules or users)
            LAYER_2_TARGETS=$(echo $EP_DATA | jq -c '.escalation_policy.escalation_rules[1].targets')
            echo "✓ Layer 2 targets found: $(echo $LAYER_2_TARGETS | jq 'length') target(s)"
            
            # DEBUG: Print the raw targets
            echo "🔍 DEBUG - Layer 2 targets:"
            echo $LAYER_2_TARGETS | jq '.'
            
            # Build assignments array - keep existing + add Layer 2
            EXISTING_ASSIGNMENTS=$(echo $INCIDENT_DATA | jq -c '.incident.assignments')
            
            echo "🔍 DEBUG - Existing assignments:"
            echo $EXISTING_ASSIGNMENTS | jq '.'
            
            # Add Layer 2 users to assignments
            NEW_ASSIGNMENTS="$EXISTING_ASSIGNMENTS"
            for target in $(echo $LAYER_2_TARGETS | jq -c '.[]'); do
              TARGET_TYPE=$(echo $target | jq -r '.type')
              TARGET_ID=$(echo $target | jq -r '.id')
              
              if [ "$TARGET_TYPE" = "user_reference" ]; then
                # Add user directly
                echo "✓ Adding user ${TARGET_ID}..."
                NEW_ASSIGNMENT=$(jq -n --arg id "$TARGET_ID" '{assignee: {id: $id, type: "user_reference"}}')
                NEW_ASSIGNMENTS=$(echo $NEW_ASSIGNMENTS | jq --argjson new "$NEW_ASSIGNMENT" '. += [$new]')
              elif [ "$TARGET_TYPE" = "schedule_reference" ]; then
                # For schedules, we need to get the on-call user
                echo "✓ Fetching on-call user from schedule ${TARGET_ID}..."
                ONCALL_DATA=$(curl -s -X GET \
                  "https://api.pagerduty.com/schedules/${TARGET_ID}/users" \
                  -H "Authorization: Token token=${PD_API_KEY}" \
                  -H "Accept: application/vnd.pagerduty+json;version=2")
                
                ONCALL_USER_ID=$(echo $ONCALL_DATA | jq -r '.users[0].id // empty')
                if [ ! -z "$ONCALL_USER_ID" ]; then
                  NEW_ASSIGNMENT=$(jq -n --arg id "$ONCALL_USER_ID" '{assignee: {id: $id, type: "user_reference"}}')
                  NEW_ASSIGNMENTS=$(echo $NEW_ASSIGNMENTS | jq --argjson new "$NEW_ASSIGNMENT" '. += [$new]')
                  echo "✓ Added on-call user ${ONCALL_USER_ID} from schedule"
                fi
              fi
            done
            
            echo "🔍 DEBUG - New assignments:"
            echo $NEW_ASSIGNMENTS | jq '.'
            
            # Update incident with new assignments
            UPDATE_PAYLOAD=$(jq -n \
              --argjson assignments "$NEW_ASSIGNMENTS" \
              '{incident: {type: "incident", assignments: $assignments}}')
            
            echo "🔍 DEBUG - Update payload:"
            echo $UPDATE_PAYLOAD | jq '.'
            
            RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT \
              "https://api.pagerduty.com/incidents/${INCIDENT_ID}" \
              -H "Authorization: Token token=${PD_API_KEY}" \
              -H "Content-Type: application/json" \
              -H "Accept: application/vnd.pagerduty+json;version=2" \
              -H "From: ${PD_FROM_EMAIL}" \
              -d "$UPDATE_PAYLOAD")
            
            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            RESPONSE_BODY=$(echo "$RESPONSE" | head -n-1)
            
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo ""
              echo "✅ SUCCESS: Layer 2 responders added successfully!"
              echo "HTTP Status: ${HTTP_CODE}"
              
              # Count new assignments
              TOTAL_ASSIGNMENTS=$(echo $NEW_ASSIGNMENTS | jq 'length')
              echo "✓ Total responders now: ${TOTAL_ASSIGNMENTS}"
            else
              echo ""
              echo "❌ ERROR: Failed to add responders"
              echo "HTTP Status: ${HTTP_CODE}"
              echo "Response: ${RESPONSE_BODY}"
              exit 1
            fi
            
          else
            if [ "$INCIDENT_STATUS" = "resolved" ]; then
              echo ""
              echo "✓ Incident is already resolved. No action needed."
            else
              echo ""
              echo "✅ Sufficient acknowledgments (${ACK_COUNT}/2). No action needed."
            fi
          fi
          
          echo ""
          echo "================================================"
          echo "Workflow completed successfully"
          echo "================================================"
