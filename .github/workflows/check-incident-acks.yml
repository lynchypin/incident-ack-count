name: Check PagerDuty Incident Acknowledgments

on:
  repository_dispatch:
    types: [check-incident-acks]

jobs:
  check-and-add-responders:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Wait 3 minutes before checking acknowledgments
        run: |
          echo "⏱️  Waiting 3 minutes before checking acknowledgment count..."
          echo "Started at: $(date)"
          sleep 10
          echo "Wait complete at: $(date)"
      
      - name: Check acknowledgment count and add responders
        env:
          PD_API_KEY: ${{ secrets.PD_API_KEY }}
          PD_FROM_EMAIL: ${{ secrets.PD_FROM_EMAIL }}
          INCIDENT_ID: ${{ github.event.client_payload.incident_id }}
          INCIDENT_NUMBER: ${{ github.event.client_payload.incident_number }}
        run: |
          python3 << 'EOF'
          import os
          import json
          import requests
          import sys
          
          # Get environment variables
          PD_API_KEY = os.environ['PD_API_KEY']
          PD_FROM_EMAIL = os.environ['PD_FROM_EMAIL']
          INCIDENT_ID = os.environ['INCIDENT_ID']
          INCIDENT_NUMBER = os.environ['INCIDENT_NUMBER']
          
          BASE_URL = "https://api.pagerduty.com"
          HEADERS = {
              "Authorization": f"Token token={PD_API_KEY}",
              "Accept": "application/vnd.pagerduty+json;version=2",
              "Content-Type": "application/json",
              "From": PD_FROM_EMAIL
          }
          
          print("=" * 50)
          print("PagerDuty Incident Acknowledgment Checker")
          print("=" * 50)
          print(f"Incident ID: {INCIDENT_ID}")
          print(f"Incident Number: {INCIDENT_NUMBER}")
          print("=" * 50)
          
          # Get incident details
          print("Fetching incident details...")
          incident_response = requests.get(f"{BASE_URL}/incidents/{INCIDENT_ID}", headers=HEADERS)
          incident_data = incident_response.json()['incident']
          
          ep_id = incident_data['escalation_policy']['id']
          ack_count = len(incident_data.get('acknowledgements', []))
          status = incident_data['status']
          
          print(f"✓ Escalation Policy ID: {ep_id}")
          print(f"✓ Incident {INCIDENT_NUMBER} has {ack_count} acknowledgment(s)")
          print(f"✓ Incident status: {status}")
          
          # Check if we need to add Layer 2
          if ack_count < 2 and status != "resolved":
              print("")
              print("⚠️  Less than 2 acknowledgments detected!")
              print("Adding Layer 2 responders from escalation policy...")
              
              # Get escalation policy details
              ep_response = requests.get(f"{BASE_URL}/escalation_policies/{ep_id}", headers=HEADERS)
              ep_data = ep_response.json()['escalation_policy']
              
              ep_name = ep_data['name']
              escalation_rules = ep_data['escalation_rules']
              
              print(f"✓ Escalation Policy: {ep_name}")
              print(f"✓ Escalation Policy has {len(escalation_rules)} level(s)")
              
              # Check if Layer 2 exists
              if len(escalation_rules) < 2:
                  print("⚠️  WARNING: Escalation Policy only has 1 level. No Layer 2 to add.")
                  sys.exit(0)
              
              # Get Layer 2 targets
              layer_2_targets = escalation_rules[1]['targets']
              print(f"✓ Layer 2 targets found: {len(layer_2_targets)} target(s)")
              
              # Get existing assignments
              existing_assignments = [
                  {"assignee": {"id": a['assignee']['id'], "type": a['assignee']['type']}}
                  for a in incident_data.get('assignments', [])
              ]
              
              print(f"✓ Existing assignments: {len(existing_assignments)}")
              
              # Add Layer 2 targets
              new_assignments = existing_assignments.copy()
              
              for target in layer_2_targets:
                  target_type = target['type']
                  target_id = target['id']
                  
                  if target_type == "user_reference":
                      print(f"✓ Adding user {target_id}...")
                      new_assignments.append({
                          "assignee": {"id": target_id, "type": "user_reference"}
                      })
                  elif target_type == "schedule_reference":
                      print(f"✓ Fetching on-call user from schedule {target_id}...")
                      oncall_response = requests.get(
                          f"{BASE_URL}/schedules/{target_id}/users",
                          headers=HEADERS
                      )
                      oncall_data = oncall_response.json()
                      
                      if oncall_data.get('users'):
                          oncall_user_id = oncall_data['users'][0]['id']
                          new_assignments.append({
                              "assignee": {"id": oncall_user_id, "type": "user_reference"}
                          })
                          print(f"✓ Added on-call user {oncall_user_id} from schedule")
              
              print(f"✓ Total assignments: {len(new_assignments)}")
              
              # Update incident
              update_payload = {
                  "incident": {
                      "type": "incident",
                      "assignments": new_assignments
                  }
              }
              
              print("Updating incident...")
              update_response = requests.put(
                  f"{BASE_URL}/incidents/{INCIDENT_ID}",
                  headers=HEADERS,
                  json=update_payload
              )
              
              if update_response.status_code in [200, 201]:
                  print("")
                  print("✅ SUCCESS: Layer 2 responders added successfully!")
                  print(f"HTTP Status: {update_response.status_code}")
                  print(f"✓ Total responders now: {len(new_assignments)}")
              else:
                  print("")
                  print("❌ ERROR: Failed to add responders")
                  print(f"HTTP Status: {update_response.status_code}")
                  print(f"Response: {update_response.text}")
                  sys.exit(1)
          
          else:
              if status == "resolved":
                  print("")
                  print("✓ Incident is already resolved. No action needed.")
              else:
                  print("")
                  print(f"✅ Sufficient acknowledgments ({ack_count}/2). No action needed.")
          
          print("")
          print("=" * 50)
          print("Workflow completed successfully")
          print("=" * 50)
          EOF
